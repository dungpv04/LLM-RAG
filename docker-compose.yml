services:
  redis:
    image: redis:7-alpine
    container_name: pdp8-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - pdp8-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdp8-backend
    gpus: all
    ports:
      - "8009:8000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./app:/app/app
      - ./config.yaml:/app/config.yaml
      - ./uploads:/app/uploads
      - ./models:/app/models
    networks:
      - pdp8-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: pdp8-worker
    gpus: all
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./app:/app/app
      - ./config.yaml:/app/config.yaml
      - ./uploads:/app/uploads
      - ./models:/app/models
    networks:
      - pdp8-network
    restart: unless-stopped

networks:
  pdp8-network:
    driver: bridge

volumes:
  redis_data:
